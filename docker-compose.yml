services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recipe_planner
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
