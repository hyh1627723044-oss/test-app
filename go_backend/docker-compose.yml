services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recipe_planner
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipe_planner"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgres://recipe:recipe@postgres:5432/recipe_planner?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
